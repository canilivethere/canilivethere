<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Location — CanILiveThere</title>
<!-- See index.html's matching comment: pre-paint dark-theme apply, same
     duplicated "theme"/"dark" literals, same reasoning. -->
<script>
  try {
    if (localStorage.getItem("theme") === "dark") {
      document.documentElement.setAttribute("data-theme", "dark");
    }
  } catch (e) {}
</script>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<main>
  <div id="loc-root"></div>
</main>
<script type="module" src="js/location.js"></script>
</body>
</html>
