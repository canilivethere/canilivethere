<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Location — CanILiveThere</title>
<!-- See index.html's matching comment: pre-paint dark-theme apply, same
     duplicated "theme"/"dark" literals, same reasoning. -->
<script>
  try {
    if (localStorage.getItem("theme") === "dark") {
      document.documentElement.setAttribute("data-theme", "dark");
    }
  } catch (e) {}
</script>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<main>
  <!-- Legacy JS-only entry point (?loc=<id>) — location.js still reads
       this route as a fallback. The primary, crawlable route is now
       /l/<location_id>.html (real static content, no JS needed) — see
       tools/prerender-locations.mjs and README.md. -->
  <div id="loc-root">
    <p>Loading… if this doesn't update, <a href="/lists.html">see every
    location as a list</a> instead.</p>
  </div>
</main>
<script type="module" src="/js/location.js"></script>
</body>
</html>
